		<div id="movieModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" id="closeModal">&times;</span>
            <h2 id="modalTitle">Movie Title</h2>
            
            <iframe id="modalVideo" width="560" height="315" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
            
            <p id="modalDescription">Movie description will appear here.</p>
            
            <button id="likeBtn">Like <span id="likeCount">0</span></button>
            <button id="dislikeBtn">Dislike <span id="dislikeCount">0</span></button>
        </div>

<!--Footer of the home page-->
	<footer>

	</footer>
	<script>
        const modal = document.getElementById('movieModal');
        const closeModal = document.getElementById('closeModal');
        const modalTitle = document.getElementById('modalTitle');
        const modalVideo = document.getElementById('modalVideo');
        const modalDescription = document.getElementById('modalDescription');
        
        const likeBtn = document.getElementById('likeBtn');
        const dislikeBtn = document.getElementById('dislikeBtn');
        const likeCount = document.getElementById('likeCount');
        const dislikeCount = document.getElementById('dislikeCount');

        let likes = 0;
        let dislikes = 0;

        const posters = document.querySelectorAll('.movie-poster');
        posters.forEach(poster => {
            poster.addEventListener('click', function() {
                modalTitle.innerText = this.getAttribute('data-title');
                modalDescription.innerText = this.getAttribute('data-description');
                modalVideo.src = this.getAttribute('data-video');
                
                likes = 0; dislikes = 0;
                likeCount.innerText = likes;
                dislikeCount.innerText = dislikes;

                modal.style.display = 'block';
            });
        });

        function closePopup() {
            modal.style.display = 'none';
            modalVideo.src = ""; 
        }

        closeModal.addEventListener('click', closePopup);

        window.addEventListener('click', function(event) {
            if (event.target === modal) {
                closePopup();
            }
        });

        likeBtn.addEventListener('click', () => {
            likes++;
            likeCount.innerText = likes;
        });

        dislikeBtn.addEventListener('click', () => {
            dislikes++;
            dislikeCount.innerText = dislikes;
        });
    </script>
