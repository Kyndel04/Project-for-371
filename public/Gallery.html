<!DOCTYPE html>
<html>
<head>
    <title> WatchMovies - Gallery </title>
    <style> 

        body {
        background-color: #141414; /* A nice, deep Netflix-style grey/black */
        color: #ffffff; /* Makes all your text white so it's readable */
        }

        .modal {
            display: none; /* Keeps the popup hidden until clicked */
            position: fixed; 
            z-index: 1000; /* Makes sure it sits on top of the table */
            left: 0; top: -20%;
            width: 100%; height: 200%;
            background-color: rgba(0,0,0,0.8); /* Darkens the background */
        }
        .modal-content {
            background-color: #222222;;
            margin: 10% auto; /* Centers the box */
            padding: 20px;
            width: 600px;
            border: 2px solid #555;;
            max-height: 80vh;
            overflow-y: auto;
        }
        .close-btn {
            float: right;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
        }
        /* Make sure the video doesn't overflow the popup box */
        #modalVideo {
            width: 100%;
            max-height: 400px;
            background-color: black;
        }
        .tag-box {
            display: inline-block;
            background-color: #e50914; /* A nice Netflix red */
            color: white;
            padding: 4px 8px;
            margin-right: 5px;
            border-radius: 5px; /* Rounds the corners of the box */
            font-size: 14px;
            font-weight: bold;
        }
    </style>
</head>
    
<body>
    <center>
        <img src="WatchMovies Logo.png" width="150"><br>

        <h1><b>WatchMovies</b></h1>

        <br>
        <button onclick="location.href='Login.html'">Logout</button>
        <button onclick="location.href='Gallery.html'">Gallery</button>
        <hr>

        <h3> WatchMovies Selection!</h3>
         <div id="editor-panel" style="display: none; background-color: #222; padding: 15px; margin-bottom: 20px; border: 1px solid #555; width: 50%;">
           <h3>Add a New Movie</h3>
           <input type="text" id="newTitle" placeholder="Movie Title"><br><br>
           <input type="text" id="newPoster" placeholder="Poster URL (Leave blank for YouTube)"><br><br>
           <input type="text" id="newDesc" placeholder="Movie Description"><br><br>
           <input type="text" id="newVideo" placeholder="Video URL (YouTube or .mp4)"><br><br>
           <button id="submitMovieBtn">Add Movie</button>
         </div>
        <br>
        <div id="movie-container" style="display: flex; gap: 20px; justify-content: center; flex-wrap: wrap;"></div>
    </center>

    <div id="movieModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" id="closeModal">&times;</span>
            <h2 id="modal-title">Movie title</h2>
            
            <iframe id="modalVideo" frameborder="0" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen style="width: 100%; height: 350px; background-color: black;"></iframe>
            
            <p id="modalDescription">Movie description will appear here.</p>

            <p><strong>Views: </strong><span id="viewCount">0</span></p>

            <p><strong> Tags: </strong><span id="modalTags">None</span></p>
            
            <button id="likeBtn">Like <span id="likeCount">0</span></button>
            <button id="dislikeBtn">Dislike <span id="dislikeCount">0</span></button>

            <hr style="border-color: #555; margin-top: 20px;">
            <h3>Comments</h3>
            <div id="commentSection" style="max-height: 150px; overflow-y: auto; background-color: #333; padding: 10px; margin-bottom: 10px; border-radius: 5px;"> </div>
            <input type="text" id="commentInput" placeholder="Add a comment..." style="width: 75%; padding: 8px; border-radius: 4px; border: none; background: #eee;">
            <button id="addCommentBtn" style="padding: 8px 15px; border-radius: 4px; border: none; background: #e50914; color: white; font-weight: bold; cursor: pointer;">Post</button>

        </div>
    </div>

    <hr>
    <footer>
        <center>
            <p>Contact: support@WatchMovies.com | 555-123-4567</p>
            <p>&copy; WatchMovies</p>
        </center>
    </footer>

    <script src="movie_popup.js"></script>
    
</body>
</html>
